[core]
inherit: $CF_BASE/law.cfg

[modules]
columnflow.tasks.cms.inference
columnflow.tasks.cms.external
azh.tasks
azh.trigger.trigger_sf

[logging]
law: INFO
luigi-interface: INFO
gfal2: WARNING
columnflow.columnar_util-perf: INFO

[analysis]
default_analysis: azh.config.analysis_azh_run3.analysis_azh
default_config: config_2022pre
default_dataset: tt_sl_powheg

calibration_modules: columnflow.calibration.cms.{jets,met}, azh.calibration.{example,default}
selection_modules: columnflow.selection.{empty}, columnflow.selection.cms.{json_filter, met_filters}, azh.selection.{example,default,categories,cutflow_sl}
production_modules: columnflow.production.{categories,normalization,processes,dy_producer}, columnflow.production.cms.{btag,electron,mc_weight,muon,pdf,pileup,scale,seeds}, azh.production.example, azh.production.default, azh.production.categories, azh.production.trigger
weight_production_modules: azh.trigger.weights
categorization_modules: azh.selection.categories, azh.production.categories
ml_modules: columnflow.ml, azh.ml.example, azh.ml.PNN
inference_modules: columnflow.inference, azh.inference.default

cf_task_namespace: cf
default_columnar_sandbox: bash::$CF_BASE/sandboxes/venv_columnar.sh
skip_ensure_proxy: False
htcondor_flavor: $CF_HTCONDOR_FLAVOR
htcondor_share_software: True
chunked_io_chunk_size: 100000
chunked_io_pool_size: 2
chunked_io_debug: False
check_finite_output: cf.CalibrateEvents, cf.SelectEvents, cf.ProduceColumns
check_overlapping_inputs: None
log_array_function_runtime: False

[outputs]
wlcg_file_systems: wlcg_fs, wlcg_fs_rwth_redirector, wlcg_fs_infn_redirector, wlcg_fs_global_redirector
lfn_sources: wlcg_fs_rwth_redirector, wlcg_fs_global_redirector, wlcg_fs_infn_redirector

[job]
job_file_dir: $CF_JOB_BASE
job_file_dir_cleanup: False
remote_lcg_setup: /cvmfs/grid.cern.ch/centos7-ui-200122/etc/profile.d/setup-c7-ui-python3-example.sh

[versions]
run3_2022_preEE__cf.CalibrateEvents: "v5"
run3_2022_preEE__cf.MergeSelectionStats: "v5"
run3_2022_preEE__cf.MergeReductionStats: "v5"
run3_2022_preEE__cf.ProvideReducedEvents: "v5"
run3_2022_preEE__cf.SelectEvents: "v5"
run3_2022_preEE__cf.ProduceColumns: "v5"
run3_2022_preEE__cf.CreateHistograms: "v5"
run3_2022_preEE__cf.MergeHistograms: "v5"
run3_2022_preEE__cf.PlotVariables1D: "v5"

[local_fs]
base: /

[wlcg_fs]
base: /data/dust/user/eranders/azh_data
create_file_dir: True
use_cache: False

[wlcg_fs_rwth_redirector]
base: root://grid-cms-xrootd.physik.rwth-aachen.de/
use_cache: $CF_WLCG_USE_CACHE
cache_root: $CF_WLCG_CACHE_ROOT
cache_cleanup: $CF_WLCG_CACHE_CLEANUP
cache_max_size: 15GB
cache_global_lock: True
cache_mtime_patience: -1

[wlcg_fs_infn_redirector]
base: root://xrootd-cms.infn.it/
use_cache: $CF_WLCG_USE_CACHE
cache_root: $CF_WLCG_CACHE_ROOT
cache_cleanup: $CF_WLCG_CACHE_CLEANUP
cache_max_size: 15GB
cache_global_lock: True
cache_mtime_patience: -1

[wlcg_fs_global_redirector]
base: root://cms-xrd-global.cern.ch/
use_cache: $CF_WLCG_USE_CACHE
cache_root: $CF_WLCG_CACHE_ROOT
cache_cleanup: $CF_WLCG_CACHE_CLEANUP
cache_max_size: 15GB
cache_global_lock: True
cache_mtime_patience: -1
